<title>Samsul Family</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#00b7ff;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    overflow:hidden;
    text-align:center;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h2{
    color:#2196F3;
}

a{
    display:inline-block;
    margin:20px;
    padding:10px 20px;
    background:#2196F3;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>

</head>

<header>
