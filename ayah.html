<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Ayah</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:linear-gradient(90deg,#4facfe,#00c6fb);
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

.card{
    width:420px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
    text-align:center;
}

.card img{
    width:100%;
    height:450px;
    object-fit:cover;
}

.card h2{
    color:#2196F3;
    margin:20px 0;
}

.card p{
    font-size:20px;
    line-height:35px;
    color:#444;
}

.btn{
    display:inline-block;
    margin:25px;
    padding:12px 25px;
    background:#2196F3;
    color:white;
    text-decoration:none;
    border-radius:10px;
    transition:.3s;
}

.btn:hover{
    background:#1565c0;
}
</style>

</head>

<body>

<header>
<h1>Profil Ayah</h1>
</header>

<div class="container">

<div class="card">

<img src="WhatsApp Image Ayah.jpeg" alt="Ayah">

<h2>Samsul Bahri</h2>

<p>
<b>Status :</b> Ayah<br>
<b>Pekerjaan :</b> Pegawai Negeri<br>
<b>Hobi :</b> Memancing<br>
<b>Tanggal Lahir :</b> 02 Februari 1982
</p>

<a href="index.html" class="btn">⬅ Kembali ke Beranda</a>

</div>

</div>

</body>
</html>
